<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>Inventory Management System</h1>
    <div class="form-section">
      <h2>Add New Item</h2>
      <form id="addItemForm">
        <input type="text" id="itemId" placeholder="Item ID (unique)" required>
        <input type="text" id="itemName" placeholder="Item Name" required>
        <select id="category" required>
          <option value="">Select Category</option>
          <option value="Electronics">Electronics</option>
          <option value="Furniture">Furniture</option>
          <option value="Clothing">Clothing</option>
          <option value="Tools">Tools</option>
          <option value="Miscellaneous">Miscellaneous</option>
        </select>
        <input type="number" id="quantity" placeholder="Quantity" min="0" required>
        <input type="number" id="price" placeholder="Price" min="0" step="0.01" required>
        <input type="text" id="supplierName" placeholder="Supplier Name" required>
        <label><input type="checkbox" id="isPopular"> Popular Item</label>
        <textarea id="comment" placeholder="Comment (optional)"></textarea>
        <button type="submit">Add Item</button>
      </form>
    </div>
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search by name...">
      <button id="showAllBtn">Show All</button>
      <button id="showPopularBtn">Show Popular</button>
    </div>
    <div id="itemList" class="item-list"></div>
  </div>
  <script type="module" src="dist/app.js"></script>
</body>
</html>
